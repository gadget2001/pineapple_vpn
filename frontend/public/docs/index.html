<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Документы • Pineapple VPN</title>
  <style>
    :root { --bg:#f6f9ef; --card:#fff; --text:#1f2b1c; --muted:#5a6a58; --line:#dbe6d0; --accent:#2f7a3b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 860px; margin: 0 auto; padding: 24px 14px 36px; }
    h1 { margin:0 0 8px; font-size: 30px; }
    .muted { color: var(--muted); margin:0 0 18px; }
    .grid { display:grid; gap:12px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; text-decoration:none; color:inherit; }
    .card:hover { border-color:#bfd7b2; }
    .title { font-weight:700; margin-bottom:4px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Документы Pineapple VPN</h1>
    <p class="muted">Официальные юридические документы сервиса.</p>
    <section class="grid">
      <a class="card" href="/docs/public-offer"><div class="title">Публичная оферта</div><div>Условия оказания услуг, оплаты и доступа.</div></a>
      <a class="card" href="/docs/privacy-policy"><div class="title">Политика конфиденциальности</div><div>Какие данные обрабатываются и как защищаются.</div></a>
      <a class="card" href="/docs/acceptable-use"><div class="title">Правила использования сервиса</div><div>Ограничения, запреты и меры при нарушениях.</div></a>
    </section>
  </main>
</body>
</html>
